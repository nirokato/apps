<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clock — apps.andymolenda.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0c;
      color: #e8e4d4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 600px; width: 100%; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    h1 .accent { color: #c4a24e; }
    .subtitle { color: #9a9686; font-size: 0.9rem; margin-bottom: 2rem; }
    .clocks { display: flex; flex-direction: column; gap: 1.25rem; }
    .clock-card {
      background: #1a1a16;
      border: 1px solid #2a2a24;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    .clock-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c4a24e;
      margin-bottom: 0.4rem;
    }
    .clock-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.25rem;
      color: #e8e4d4;
      letter-spacing: -0.01em;
    }
    .clock-date {
      font-size: 0.8rem;
      color: #9a9686;
      margin-top: 0.25rem;
    }
    .back { margin-top: 2rem; font-size: 0.85rem; }
    .back a { color: #9a9686; text-decoration: none; }
    .back a:hover { color: #c4a24e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>world<span class="accent"> </span>clock</h1>
    <p class="subtitle">Current time across timezones.</p>
    <div class="clocks">
      <div class="clock-card" id="mountain">
        <div class="clock-label">US / Mountain</div>
        <div class="clock-time" id="time-mountain">--:--:--</div>
        <div class="clock-date" id="date-mountain"></div>
      </div>
      <div class="clock-card" id="utc">
        <div class="clock-label">UTC</div>
        <div class="clock-time" id="time-utc">--:--:--</div>
        <div class="clock-date" id="date-utc"></div>
      </div>
      <div class="clock-card" id="tokyo">
        <div class="clock-label">Asia / Tokyo</div>
        <div class="clock-time" id="time-tokyo">--:--:--</div>
        <div class="clock-date" id="date-tokyo"></div>
      </div>
    </div>
    <p class="back"><a href="https://apps.andymolenda.com">&larr; apps.andymolenda.com</a></p>
  </div>
  <script>
    const zones = [
      { id: 'mountain', tz: 'America/Denver',  label: 'US/Mountain' },
      { id: 'utc',      tz: 'UTC',              label: 'UTC' },
      { id: 'tokyo',    tz: 'Asia/Tokyo',       label: 'Asia/Tokyo' },
    ];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      zones.forEach(({ id, tz }) => {
        const timeEl = document.getElementById('time-' + id);
        const dateEl = document.getElementById('date-' + id);

        const timeFmt = new Intl.DateTimeFormat('en-US', {
          timeZone: tz,
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        });
        const dateFmt = new Intl.DateTimeFormat('en-US', {
          timeZone: tz,
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric',
        });

        timeEl.textContent = timeFmt.format(now);
        dateEl.textContent = dateFmt.format(now);
      });
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
