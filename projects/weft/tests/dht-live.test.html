<!DOCTYPE html>
<html><head><title>Test: DHT Record Creation (Live Network)</title></head>
<body>
<script type="module">
import { t } from './harness.js';

// --- Clear IndexedDB to avoid stale encryption key errors ---
const dbs = await indexedDB.databases?.() || [];
for (const db of dbs) {
  if (db.name) indexedDB.deleteDatabase(db.name);
}

// --- Worker helper ---
let callId = 0;
const pending = new Map();
const updates = [];
let attachmentState = 'Detached';
let attachResolve = null;

const worker = new Worker('../src/veilid-worker.js', { type: 'module' });

worker.onmessage = (e) => {
  const { id, result, error, type, update } = e.data;
  if (type === 'update') {
    updates.push(update);
    if (update.kind === 'Attachment') {
      attachmentState = update.state;
      console.log('[dht-live] Attachment state:', attachmentState);
      if (attachResolve && isAttached(attachmentState)) {
        attachResolve();
        attachResolve = null;
      }
    }
    return;
  }
  const p = pending.get(id);
  if (!p) return;
  pending.delete(id);
  if (error) p.reject(new Error(error));
  else p.resolve(result);
};

// Prevent worker errors from becoming uncaught page errors.
// Also reject all pending calls since the worker may not respond.
worker.onerror = (e) => {
  e.preventDefault();
  const msg = e.message || 'Unknown worker error';
  console.error('[dht-live] Worker error (suppressed):', msg);
  for (const [id, p] of pending) {
    p.reject(new Error('Worker error: ' + msg));
  }
  pending.clear();
};

function call(action, params, timeoutMs = 15000) {
  return new Promise((resolve, reject) => {
    const id = callId++;
    const timer = setTimeout(() => {
      pending.delete(id);
      reject(new Error(`Timeout: ${action} did not respond within ${timeoutMs / 1000}s`));
    }, timeoutMs);
    pending.set(id, {
      resolve: (v) => { clearTimeout(timer); resolve(v); },
      reject: (e) => { clearTimeout(timer); reject(e); },
    });
    worker.postMessage({ id, action, params });
  });
}

function isAttached(state) {
  return ['AttachedWeak', 'AttachedGood', 'AttachedStrong',
          'FullyAttached', 'OverAttached'].includes(state);
}

function waitForAttachment(timeoutMs = 90000) {
  if (isAttached(attachmentState)) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      attachResolve = null;
      reject(new Error(`Timed out waiting for attachment (last state: ${attachmentState})`));
    }, timeoutMs);
    attachResolve = () => {
      clearTimeout(timer);
      resolve();
    };
  });
}

// ============================================================
// Live DHT Tests
// ============================================================

let dhtResult = null;
let createRoomDHTSucceeded = false;

t.test('init: Veilid WASM loads and core starts', async (a) => {
  const result = await call('init', {}, 60000);
  a.ok(result.ok, 'init returned ok');
});

t.test('identity: generate keypair', async (a) => {
  const kp = await call('generateKeyPair');
  a.ok(kp.publicKey, 'publicKey is set');
  a.ok(kp.secretKey, 'secretKey is set');
  console.log('[dht-live] Identity publicKey:', kp.publicKey);
});

t.test('attach: wait for AttachedWeak or better (up to 90s)', async (a) => {
  await waitForAttachment(90000);
  a.ok(isAttached(attachmentState), `attached: ${attachmentState}`);
  console.log('[dht-live] Attached with state:', attachmentState);
});

t.test('createRoomDHT: creates DHT record for test-room', async (a) => {
  dhtResult = await call('createRoomDHT', { roomName: 'test-room' }, 15000);
  createRoomDHTSucceeded = true;
  a.ok(dhtResult.dhtKey, 'dhtKey is set');
  a.ok(dhtResult.ownerKey, 'ownerKey is set');
  a.ok(dhtResult.ownerSecret, 'ownerSecret is set');
  a.ok(dhtResult.encryptionKey, 'encryptionKey is set');
  console.log('[dht-live] createRoomDHT result:');
  console.log('[dht-live]   dhtKey:', dhtResult.dhtKey);
  console.log('[dht-live]   ownerKey:', dhtResult.ownerKey);
  console.log('[dht-live]   ownerSecret:', dhtResult.ownerSecret);
  console.log('[dht-live]   encryptionKey:', dhtResult.encryptionKey);
});

t.test('openRoomDHT: re-open and read back metadata', async (a) => {
  if (!createRoomDHTSucceeded) {
    console.log('[dht-live] SKIP openRoomDHT: createRoomDHT did not succeed');
    a.ok(true, 'skipped (createRoomDHT failed)');
    return;
  }
  // Close first to re-open cleanly
  await call('closeDHTRecord', { key: dhtResult.dhtKey });

  const room = await call('openRoomDHT', { dhtKey: dhtResult.dhtKey, ownerKey: dhtResult.ownerKey, ownerSecret: dhtResult.ownerSecret });
  a.ok(room.key, 'key is set');
  a.ok(room.metadata, 'metadata was read back');
  a.equal(room.metadata.name, 'test-room', 'room name matches');
  a.equal(room.metadata.v, 1, 'metadata version is 1');
  a.ok(room.metadata.created_at, 'created_at is set');
  a.ok(room.metadata.member_keys.length > 0, 'member_keys is populated');
  console.log('[dht-live] openRoomDHT metadata:', JSON.stringify(room.metadata));

  await call('closeDHTRecord', { key: dhtResult.dhtKey });
});

t.test('cleanup: shutdown Veilid', async (a) => {
  try {
    await call('shutdown', {}, 10000);
  } catch (e) {
    // shutdown may fail if worker errored; that's ok
    console.log('[dht-live] shutdown error (non-fatal):', e.message);
  }
  a.ok(true, 'shutdown attempted');
});

// ============================================================

await t.end();
</script>
</body>
</html>
