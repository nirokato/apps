<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weft — apps.andymolenda.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === Base === */
    :root {
      --bg: #0f0f0c;
      --surface: #1a1a16;
      --border: #2a2a24;
      --text: #e8e4d4;
      --text-secondary: #9a9686;
      --accent: #c4a24e;
      --error: #c44e4e;
      --success: #4ec44e;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      font-size: 14px;
    }

    /* === Centered content (loading, setup) === */
    .center-content {
      max-width: 500px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* === Identity bar === */
    .identity-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .identity-bar .label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .inline-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.25rem 0;
    }

    .inline-input:focus {
      outline: none;
      border-bottom-color: var(--accent);
    }

    /* === Sections === */
    .section {
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    /* === Room cards (setup) === */
    .room-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.9rem;
      text-align: left;
      transition: border-color 0.15s;
    }

    .room-card:hover {
      border-color: var(--accent);
    }

    .room-name { font-weight: 600; }
    .room-meta { color: var(--text-secondary); font-size: 0.8rem; font-family: var(--mono); }

    /* === Inputs & buttons === */
    .input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      padding: 0.5rem 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--text-secondary); opacity: 0.6; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
    }

    .btn-secondary:hover { border-color: var(--accent); }

    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }

    .btn-icon:hover { color: var(--text); background: var(--surface); }

    .btn-send {
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: var(--font);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-send:hover { opacity: 0.9; }

    .import-label { cursor: pointer; }

    .action-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .action-row .input { flex: 1; }

    /* === Chat layout === */
    .chat-layout {
      max-width: 700px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === Header === */
    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-title {
      font-weight: 700;
      color: var(--accent);
    }

    .header-sep { color: var(--text-secondary); }
    .header-room { font-weight: 600; }

    .status {
      font-size: 0.75rem;
      font-family: var(--mono);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }

    .status-offline { color: var(--text-secondary); }
    .status-connected { color: var(--success); }
    .status-connecting { color: var(--accent); }

    /* === Search === */
    .search-bar {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .search-input { width: 100%; }

    .search-clear {
      position: absolute;
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
    }

    .search-results {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .search-results-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .search-result {
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 0.25rem;
    }

    .search-result:hover { background: var(--border); }

    .search-result-topic {
      font-weight: 600;
      color: var(--accent);
      font-size: 0.85rem;
    }

    .search-result-content {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.15rem;
    }

    .search-result-time {
      font-size: 0.75rem;
      font-family: var(--mono);
      color: var(--text-secondary);
    }

    /* === Topic river === */
    .topic-river {
      flex: 1;
      padding: 0.75rem 1rem;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      padding: 3rem 1rem;
    }

    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .topic-card.expanded {
      border-color: var(--accent);
    }

    .topic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      cursor: pointer;
      user-select: none;
    }

    .topic-header:hover { background: rgba(196, 162, 78, 0.05); }

    .topic-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .topic-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .topic-count {
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    .badge {
      background: var(--accent);
      color: var(--bg);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }

    .topic-preview {
      padding: 0 1rem 0.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .preview-sender {
      font-weight: 600;
      color: var(--text);
    }

    /* === Messages === */
    .topic-messages {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      max-height: 400px;
      overflow-y: auto;
    }

    .message {
      padding: 0.5rem 0;
    }

    .message + .message {
      border-top: 1px solid rgba(42, 42, 36, 0.5);
    }

    .message.own .message-sender { color: var(--accent); }

    .message-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.2rem;
    }

    .message-sender {
      font-weight: 600;
      font-size: 0.85rem;
    }

    .message-time {
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--text-secondary);
    }

    .message-content {
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* === Compose === */
    .topic-compose {
      display: flex;
      gap: 0.5rem;
      padding: 0.5rem 1rem 0.75rem;
      border-top: 1px solid var(--border);
    }

    .compose-input { flex: 1; }

    /* === New topic bar === */
    .new-topic-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      bottom: 0;
    }

    .new-topic-input { width: 140px; flex-shrink: 0; }
    .new-topic-message { flex: 1; }

    /* === Footer === */
    .chat-footer {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
    }

    .back-link {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-decoration: none;
    }

    .back-link:hover { color: var(--accent); }

    /* === Settings === */
    .settings-layout {
      max-width: 700px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .settings-content {
      padding: 1.5rem 1rem;
    }

    .setting-group {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .setting-group h3 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .setting-label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
      margin-top: 0.5rem;
    }

    .setting-value {
      display: block;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-secondary);
      word-break: break-all;
      padding: 0.3rem 0;
    }

    .member-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
      font-size: 0.85rem;
    }

    .member-role {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-family: var(--mono);
    }

    /* === Shared === */
    .error {
      color: var(--error);
      font-size: 0.85rem;
      padding: 0.5rem;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 100;
    }

    .toast.error {
      background: var(--error);
      color: var(--text);
    }

    .back {
      font-size: 0.85rem;
      margin-top: 2rem;
    }

    .back a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .back a:hover { color: var(--accent); }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* === Responsive === */
    @media (max-width: 600px) {
      .new-topic-bar {
        flex-wrap: wrap;
      }
      .new-topic-input {
        width: 100%;
      }
      .new-topic-message {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
