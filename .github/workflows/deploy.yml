name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "projects/**"
      - "tofu/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths:
      - "tofu/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  infra:
    name: Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tofu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Init
        run: |
          cat > backend.conf <<EOF
          access_key = "${{ secrets.R2_ACCESS_KEY_ID }}"
          secret_key = "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          endpoints = {
            s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          EOF
          tofu init -backend-config=backend.conf
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Plan
        id: plan
        run: |
          tofu plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          {
            echo 'plan<<EOF'
            cat plan_output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
        with:
          script: |
            const plan = process.env.PLAN;

            const body = [
              '### OpenTofu Plan',
              '',
              '<details>',
              '<summary>Plan output</summary>',
              '',
              '```',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### OpenTofu Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: tofu apply -auto-approve tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  discover:
    name: Discover projects
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan projects directory
        id: scan
        run: |
          matrix=$(ls -d projects/*/ | while read dir; do
            name=$(basename "$dir")
            echo "{\"name\":\"$name\",\"pages_project\":\"andy-apps-$name\",\"directory\":\"projects/$name\"}"
          done | jq -s -c '{project: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.project.name }}
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [infra, discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ matrix.project.directory }} --project-name=${{ matrix.project.pages_project }} --branch=main
